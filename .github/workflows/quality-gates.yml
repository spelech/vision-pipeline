name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vision
          POSTGRES_PASSWORD: vision_pass
          POSTGRES_DB: vision_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vision -d vision_pipeline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Check migration drift
        env:
          MIGRATION_DB_URL: postgresql+psycopg2://vision:vision_pass@localhost:5432/vision_pipeline
        run: |
          python scripts/check_db_migrations.py

      - name: Check generated test requirements index
        run: |
          node scripts/update-test-requirements-index.mjs --check

      - name: Run backend tests with minimum coverage
        run: |
          pytest src/tests --cov=src --cov-fail-under=82 --cov-report=term --cov-report=xml:coverage/python-coverage.xml

  frontend-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: web
        run: npm run test:coverage

      - name: Enforce frontend branch/function no-regression
        run: node scripts/check-frontend-coverage-regression.mjs

