services:
  db:
    image: postgres:16-alpine
    container_name: vision-db
    labels:
      - "wud.watch=false"
    environment:
      - POSTGRES_USER=${DB_USER:-vision}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vision_pass}
      - POSTGRES_DB=${DB_NAME:-vision_pipeline}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vision} -d ${DB_NAME:-vision_pipeline}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - default
    restart: unless-stopped

  vision-pipeline:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: vision-pipeline
    env_file:
      - .env
    image: ${VISION_PIPELINE_IMAGE:-ghcr.io/spelech/vision-pipeline}:${VISION_PIPELINE_TAG:-latest}
    labels:
      - "wud.watch=true"
      - "wud.display.name=vision-pipeline"
      - "wud.tag.include=^latest$|^v?[0-9]+\\.[0-9]+\\.[0-9]+$"
      - "wud.trigger.docker.autoupdate=true"
    networks:
      - default
      - net_webservices
    ports:
      - "${APP_PORT:-8460}:8501"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: vision_default
  net_webservices:
    external: ${EXTERNAL_NETWORK_EXISTS:-false}
    name: ${EXTERNAL_NETWORK:-net_webservices}
