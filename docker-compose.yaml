services:
  db:
    image: postgres:16-alpine
    container_name: vision-db
    environment:
      - POSTGRES_USER=vision
      - POSTGRES_PASSWORD=vision_pass
      - POSTGRES_DB=vision_pipeline
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped

  vision-pipeline:
    build:
      context: ./src
    container_name: vision-pipeline
    networks:
      - default
      - net_webservices
    ports:
      - "8460:8501"
    volumes:
      - ./src:/app
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SEARXNG_URL=${SEARXNG_URL}
      - HOMEBOX_URL=http://homebox:7745/api/v1
      - HOMEBOX_USERNAME=${HOMEBOX_USERNAME}
      - HOMEBOX_PASSWORD=${HOMEBOX_PASSWORD}
      - HOMEBOX_API_KEY=${HOMEBOX_API_KEY}
      - PRICEBUDDY_API_KEY=${PRICEBUDDY_API_KEY}
      - CHANGEDETECTION_API_KEY=${CHANGEDETECTION_API_KEY}
      - MEALIE_API_TOKEN=${MEALIE_API_TOKEN}
      - MEALIE_URL=${MEALIE_URL}
      - DATABASE_URL=postgresql+asyncpg://vision:vision_pass@db:5432/vision_pipeline
    depends_on:
      - db
    restart: unless-stopped

  playwright-scraper:
    build:
      context: ./playwright
    container_name: vision-playwright
    networks:
      - default
    restart: unless-stopped

networks:
  net_webservices:
    external: true
