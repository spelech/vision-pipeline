services:
  db:
    image: postgres:16-alpine
    container_name: vision-db
    environment:
      - POSTGRES_USER=${DB_USER:-vision}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vision_pass}
      - POSTGRES_DB=${DB_NAME:-vision_pipeline}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped

  vision-pipeline:
    build:
      context: ./src
    container_name: vision-pipeline
    env_file:
      - .env.remote
    image: ghcr.io/spelech/vision-pipeline:latest
    networks:
      - default
      - net_webservices
    ports:
      - "${APP_PORT:-8460}:8501"
    volumes:
      - ./src:/app
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://vision:vision_pass@db:5432/vision_pipeline}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - db
    restart: unless-stopped

  playwright-scraper:
    build:
      context: ./playwright
    container_name: vision-playwright
    image: ghcr.io/spelech/vision-playwright:latest
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: vision_default
  net_webservices:
    external: ${EXTERNAL_NETWORK_EXISTS:-false}
    name: ${EXTERNAL_NETWORK:-net_webservices}
