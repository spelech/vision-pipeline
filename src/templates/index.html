<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Pipeline 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-dark { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .ios-toggle { position: relative; width: 44px; height: 24px; appearance: none; background: #333; border-radius: 20px; transition: .4s; cursor: pointer; }
        .ios-toggle:checked { background: #34C759; }
        .ios-toggle::before { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; top: 2px; left: 2px; background: #fff; transition: .4s; transform: scale(1); }
        .ios-toggle:checked::before { left: 22px; }
        .btn-primary { background: #fff; color: #000; font-weight: 700; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.96); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="visionApp()" class="scrollbar-hide antialiased">
    <!-- Top Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-lg shadow-lg shadow-blue-500/20"></div>
            <h1 class="text-lg font-black tracking-tighter uppercase">Vision 2.0</h1>
        </div>
        <div class="flex gap-1 bg-white/5 p-1 rounded-xl">
            <template x-for="tab in ['capture', 'batch', 'review']">
                <button @click="activeTab = tab" 
                        :class="activeTab === tab ? 'bg-white/10 text-white shadow-sm' : 'text-white/40 hover:text-white'"
                        class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all uppercase tracking-widest" 
                        x-text="tab"></button>
            </template>
        </div>
    </nav>

    <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-8">
        <!-- Tab: Single Capture -->
        <div x-show="activeTab === 'capture'" class="space-y-8" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4">
            <!-- Viewfinder -->
            <div class="relative rounded-3xl overflow-hidden glass aspect-[3/4] shadow-2xl group">
                <template x-if="!aiPreview">
                    <div class="absolute inset-0 flex flex-col items-center justify-center space-y-4">
                        <div class="w-20 h-20 rounded-full border-4 border-white/10 flex items-center justify-center animate-pulse">
                            <span class="text-4xl">📸</span>
                        </div>
                        <p class="text-white/40 text-sm font-medium tracking-wide">Frame an item to identify</p>
                    </div>
                </template>
                <img x-show="aiPreview" :src="aiPreview" class="w-full h-full object-cover">
                
                <div class="absolute bottom-8 left-0 right-0 flex justify-center px-8 gap-4">
                    <label class="cursor-pointer">
                        <input type="file" capture="environment" accept="image/*" class="hidden" @change="onFileSelected">
                        <div class="bg-white text-black px-10 py-5 rounded-[2rem] font-black uppercase tracking-widest text-xs shadow-2xl active:scale-95 transition-all">Identify Item</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="file" accept="image/*" class="hidden" @change="onFileSelected">
                        <div class="bg-white/10 backdrop-blur-xl border border-white/10 text-white p-5 rounded-[2rem] active:scale-95 transition-all">📂</div>
                    </label>
                </div>

                <div x-show="aiPreview" class="absolute top-6 right-6 flex flex-col gap-2">
                    <button @click="rotation = (rotation + 90) % 360" class="glass-dark p-3 rounded-xl hover:bg-white/10 transition-colors">🔄</button>
                    <button @click="mirror = !mirror" class="glass-dark p-3 rounded-xl hover:bg-white/10 transition-colors">↔️</button>
                </div>
            </div>

            <!-- Single Result Panel -->
            <div x-show="results" class="space-y-6" x-transition>
                <div class="glass p-8 rounded-[3rem] shadow-2xl space-y-8">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Identity</label>
                        <input type="text" x-model="form.product_name" class="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-xl font-black focus:ring-2 focus:ring-white/20 outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Brand</label>
                            <input type="text" x-model="form.brand" class="w-full bg-white/5 border border-white/5 rounded-2xl px-5 py-4 text-sm font-bold outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Category</label>
                            <input type="text" x-model="form.category" class="w-full bg-white/5 border border-white/5 rounded-2xl px-5 py-4 text-sm font-bold outline-none">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Description</label>
                        <textarea x-model="form.description" rows="3" class="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-sm font-medium outline-none resize-none"></textarea>
                    </div>

                    <!-- Details Toggle -->
                    <div x-data="{ open: false }" class="border-t border-white/5 pt-6">
                        <button @click="open = !open" class="flex items-center gap-2 text-[10px] font-black text-white/30 uppercase tracking-widest hover:text-white transition-colors">
                            <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            Technical Details & Specs
                        </button>
                        <div x-show="open" x-transition class="space-y-4 mt-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-white/30 uppercase ml-1">Manufacturer</label>
                                    <input type="text" x-model="form.manufacturer" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-xs font-bold outline-none">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-white/30 uppercase ml-1">MSRP</label>
                                    <input type="text" x-model="form.msrp" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-xs font-bold outline-none">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-white/30 uppercase ml-1">Model #</label>
                                    <input type="text" x-model="form.model_number" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-xs font-bold outline-none">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-white/30 uppercase ml-1">Serial #</label>
                                    <input type="text" x-model="form.serial_number" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-xs font-bold outline-none">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-white/30 uppercase ml-1">Technical Details</label>
                                <textarea x-model="form.technical_details" rows="3" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-[10px] font-mono outline-none resize-none"></textarea>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-white/30 uppercase ml-1">Product Link</label>
                                <input type="text" x-model="form.product_url" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-xs font-bold outline-none">
                            </div>
                        </div>
                    </div>

                    <!-- Multi-Service Pipeline -->
                    <div class="border-t border-white/10 pt-8 space-y-6">
                        <div class="flex justify-between items-center px-1">
                            <h3 class="text-xs font-black text-white/40 uppercase tracking-widest">Execute Pipeline</h3>
                            <div class="text-[10px] font-black text-blue-500 uppercase tracking-widest" x-text="selectedServices.length + ' Targets Selected'"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <template x-for="svc in [
                                {id: 'homebox', label: 'Homebox', sub: 'Inventory'},
                                {id: 'mealie', label: 'Mealie', sub: 'Recipes'},
                                {id: 'pricebuddy', label: 'PriceBuddy', sub: 'Tracking'},
                                {id: 'changedetection', label: 'Tracker', sub: 'Monitoring'}
                            ]">
                                <label class="flex items-center justify-between p-4 glass-dark rounded-2xl border border-white/5 cursor-pointer hover:bg-white/[0.02] transition-colors group">
                                    <div>
                                        <div class="text-[11px] font-black uppercase tracking-tight group-hover:text-white transition-colors" x-text="svc.label"></div>
                                        <div class="text-[9px] text-white/30 font-bold uppercase tracking-widest" x-text="svc.sub"></div>
                                    </div>
                                    <input type="checkbox" :value="svc.id" x-model="selectedServices" class="ios-toggle scale-75 origin-right">
                                </label>
                            </template>
                        </div>

                        <button @click="triggerServices()" :disabled="executing"
                                class="w-full btn-primary py-6 rounded-[2rem] text-sm font-black uppercase tracking-[0.3em] shadow-2xl shadow-white/10 active:scale-[0.98] transition-all disabled:opacity-50">
                            <span x-show="!executing">Execute Workflow</span>
                            <div x-show="executing" class="w-6 h-6 border-2 border-black/20 border-t-black rounded-full animate-spin mx-auto"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Batch -->
        <div x-show="activeTab === 'batch'" class="space-y-8" x-transition>
            <div class="glass p-12 rounded-[3.5rem] space-y-10 text-center border-dashed border-2 border-white/10">
                <div class="space-y-4">
                    <div class="text-7xl mb-6">🗂️</div>
                    <h2 class="text-3xl font-black tracking-tighter">Bulk Ingestion</h2>
                    <p class="text-white/40 text-sm max-w-xs mx-auto leading-relaxed">Select multiple high-resolution images for concurrent AI analysis.</p>
                </div>

                <div class="space-y-4 text-left">
                    <label class="text-[10px] font-black text-white/30 uppercase tracking-widest ml-4">Batch Description / Context</label>
                    <textarea x-model="textInfo" placeholder="e.g. Toiletries for the master bathroom..." 
                              class="w-full bg-white/5 border border-white/5 rounded-[2rem] px-8 py-6 text-sm focus:ring-2 focus:ring-white/20 outline-none resize-none"></textarea>
                </div>

                <label class="block cursor-pointer group">
                    <input type="file" multiple accept="image/*" class="hidden" @change="onBatchSelected">
                    <div class="bg-white text-black py-6 rounded-[2rem] font-black uppercase tracking-widest text-xs group-active:scale-95 transition-all shadow-2xl">Upload Files</div>
                </label>
            </div>
        </div>

        <!-- Tab: Review -->
        <div x-show="activeTab === 'review'" class="space-y-6" x-transition>
            <div class="flex justify-between items-center mb-8 px-2">
                <h2 class="text-3xl font-black tracking-tight">Queue</h2>
                <div class="flex gap-2 p-1 bg-white/5 rounded-2xl">
                    <button @click="filterType = 'all'" :class="filterType === 'all' ? 'bg-white text-black' : 'text-white/40 hover:text-white'" class="px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">All</button>
                    <button @click="filterType = 'food'" :class="filterType === 'food' ? 'bg-white text-black' : 'text-white/40 hover:text-white'" class="px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Food</button>
                </div>
            </div>

            <div class="space-y-4">
                <template x-for="item in filteredQueue" :key="item.id">
                    <div class="glass rounded-[2.5rem] overflow-hidden group">
                        <div class="flex h-36 border-b border-white/5">
                            <div class="w-36 h-full relative flex-shrink-0">
                                <img :src="'/uploads/' + item.image_path" class="w-full h-full object-cover">
                                <div x-show="item.status === 'processing'" class="absolute inset-0 bg-black/60 backdrop-blur-xl flex items-center justify-center">
                                    <div class="w-8 h-8 border-2 border-white/10 border-t-white rounded-full animate-spin"></div>
                                </div>
                            </div>
                            <div class="p-6 flex-1 min-w-0 flex flex-col justify-center">
                                <div class="flex justify-between items-start">
                                    <div class="truncate">
                                        <input type="text" x-model="item.edit_data.product_name" class="bg-transparent border-none p-0 text-xl font-black focus:ring-0 w-full tracking-tight">
                                        <div class="text-[10px] text-white/40 font-black uppercase tracking-[0.2em] mt-1.5" x-text="item.edit_data.brand || 'Unnamed Brand'"></div>
                                    </div>
                                    <button @click="item.show_more = !item.show_more" class="glass-dark p-3 rounded-2xl active:scale-90 transition-all hover:bg-white/10">
                                        <svg class="w-4 h-4 transition-transform" :class="item.show_more ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M19 9l-7 7-7-7"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Card Expansion -->
                        <div x-show="item.show_more" class="p-8 bg-white/[0.02] space-y-8" x-transition>
                            <div class="grid grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[9px] font-black text-white/30 uppercase tracking-widest ml-1">Store Location</label>
                                    <select x-model="item.edit_data.location" class="w-full bg-white/5 border border-white/5 rounded-[1.25rem] px-5 py-4 text-xs font-black outline-none focus:ring-2 focus:ring-white/20 transition-all">
                                        <template x-for="loc in locations">
                                            <option :value="loc.name" x-text="loc.name"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-black text-white/30 uppercase tracking-widest ml-1">Qty</label>
                                        <input type="number" x-model="item.edit_data.quantity" class="w-full bg-white/5 border border-white/5 rounded-[1.25rem] px-5 py-4 text-xs font-black outline-none">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-black text-white/30 uppercase tracking-widest ml-1">Unit</label>
                                        <input type="text" x-model="item.edit_data.unit" class="w-full bg-white/5 border border-white/5 rounded-[1.25rem] px-5 py-4 text-xs font-black outline-none">
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-4">
                                <label class="text-[9px] font-black text-white/30 uppercase tracking-widest ml-1">Pipeline Targets</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <template x-for="svc in ['homebox', 'mealie', 'pricebuddy', 'changedetection']">
                                        <label class="glass-dark p-4 rounded-2xl flex items-center justify-between border border-white/5 cursor-pointer hover:bg-white/5 transition-colors">
                                            <span class="text-[10px] font-black uppercase" x-text="svc === 'changedetection' ? 'Tracker' : svc"></span>
                                            <input type="checkbox" :value="svc" x-model="item.selected_services" class="ios-toggle scale-75 origin-right">
                                        </label>
                                    </template>
                                </div>
                            </div>

                            <div class="flex gap-4 pt-4">
                                <button @click="triggerServices(item)" :disabled="item.executing" 
                                        class="flex-1 btn-primary py-5 rounded-[1.5rem] text-[10px] font-black uppercase tracking-[0.2em] shadow-xl">
                                    <span x-show="!item.executing">Process Item</span>
                                    <div x-show="item.executing" class="w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin mx-auto"></div>
                                </button>
                                <button @click="discardItem(item.id)" class="glass px-8 rounded-[1.5rem] text-[10px] font-black uppercase tracking-widest text-red-500 hover:bg-red-500/10 transition-colors">Discard</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <!-- Global Components -->
    <div class="fixed bottom-12 left-0 right-0 z-[100] flex flex-col items-center gap-3 pointer-events-none px-6">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.show" 
                 x-transition:enter="transition cubic-bezier(0.17, 0.67, 0.83, 0.67) duration-500"
                 x-transition:enter-start="opacity-0 translate-y-12 scale-90"
                 class="glass-dark px-8 py-4 rounded-[2rem] text-xs font-black shadow-2xl border border-white/10"
                 :class="toast.type === 'error' ? 'text-red-400' : 'text-white'"
                 x-text="toast.msg"></div>
        </template>
    </div>

    <div x-show="loading" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-3xl flex items-center justify-center" x-transition>
        <div class="text-center space-y-10 scale-110">
            <div class="w-20 h-20 border-4 border-white/5 border-t-white rounded-full animate-spin mx-auto shadow-2xl"></div>
            <p class="text-xs font-black uppercase tracking-[0.5em] text-white/60" x-text="loadingStatus"></p>
        </div>
    </div>

    <script>
        function visionApp() {
            return {
                activeTab: 'capture',
                loading: false,
                loadingStatus: 'IDENTIFYING...',
                executing: false,
                results: null,
                aiPreview: null,
                textInfo: '',
                queue: [],
                filterType: 'all',
                selectedServices: ['homebox'],
                form: {
                    product_name: '', brand: '', manufacturer: '', model_number: '', serial_number: '',
                    category: '', description: '', technical_details: '', notes: '',
                    quantity: 1, unit: '', msrp: '', product_url: '',
                    location: 'pantry', is_food: false, purchase_price: 0
                },
                rotation: parseInt(localStorage.getItem('vision_rotation')) || 0,
                mirror: localStorage.getItem('vision_mirror') === 'true',
                toasts: [],
                locations: [],

                init() {
                    this.fetchLocations();
                    this.fetchQueue();
                    setInterval(() => {
                        if (this.queue.some(i => i.status === 'processing')) this.fetchQueue();
                    }, 5000);
                },

                async fetchLocations() {
                    try {
                        const response = await fetch('/locations');
                        const data = await response.json();
                        if (data.success) this.locations = data.locations;
                    } catch (err) { console.error(err); }
                },

                async fetchQueue() {
                    try {
                        const response = await fetch('/queue?status=pending');
                        const data = await response.json();
                        const procResponse = await fetch('/queue?status=processing');
                        const procData = await procResponse.json();
                        
                        this.queue = [...procData.items, ...data.items].map(i => {
                            const llm = i.ai_output?.llm_output || {};
                            return {
                                ...i,
                                show_more: false,
                                executing: false,
                                selected_services: i.product_type === 'food' ? ['mealie'] : ['homebox'],
                                edit_data: i.user_overrides || {
                                    product_name: llm.product_name || '',
                                    brand: llm.brand || '',
                                    manufacturer: llm.manufacturer || llm.brand || '',
                                    model_number: llm.model_number || '',
                                    serial_number: llm.serial_number || '',
                                    category: llm.category || '',
                                    description: llm.description || '',
                                    technical_details: llm.technical_details || '',
                                    notes: llm.notes || '',
                                    quantity: 1, unit: '', location: 'pantry',
                                    msrp: llm.msrp || '', product_url: llm.product_url || '',
                                    purchase_price: parseFloat(llm.msrp?.replace(/[^0-9.]/g, '')) || 0
                                }
                            };
                        });
                    } catch (err) { console.error(err); }
                },

                async onFileSelected(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    this.loading = true;
                    this.results = null;
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('rotation', this.rotation);
                    formData.append('mirror', this.mirror);
                    try {
                        const response = await fetch('/identify', { method: 'POST', body: formData });
                        const data = await response.json();
                        if (data.success) {
                            this.results = data.results;
                            this.aiPreview = data.ai_preview;
                            const llm = data.results.llm_output;
                            this.form = {
                                product_name: llm.product_name, brand: llm.brand, 
                                manufacturer: llm.manufacturer || llm.brand || '',
                                model_number: llm.model_number || '',
                                serial_number: llm.serial_number || '',
                                category: llm.category, description: llm.description,
                                technical_details: llm.technical_details || '',
                                notes: llm.notes || '',
                                quantity: 1, unit: '', msrp: llm.msrp || '',
                                product_url: llm.product_url || '',
                                location: 'pantry', is_food: llm.is_food,
                                purchase_price: parseFloat(llm.msrp?.replace(/[^0-9.]/g, '')) || 0
                            };
                            this.notify('Identity Confirmed');
                        }
                    } catch (err) { this.notify('Identification Error', 'error'); }
                    finally { this.loading = false; }
                },

                async triggerServices(item = null) {
                    const targetItem = item || { id: null, edit_data: this.form, selected_services: this.selectedServices };
                    if (item) item.executing = true; else this.executing = true;

                    try {
                        const response = await fetch('/execute', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                item_id: targetItem.id,
                                service_names: targetItem.selected_services,
                                overrides: targetItem.edit_data
                            })
                        });
                        const data = await response.json();
                        if (data.success) {
                            this.notify('Pipeline Executed');
                            if (item) this.fetchQueue(); else this.results = null;
                        } else {
                            this.notify(data.error || 'Execution Error', 'error');
                        }
                    } catch (err) { this.notify('Execution Failed', 'error'); }
                    finally { if (item) item.executing = false; else this.executing = false; }
                },

                async onBatchSelected(e) {
                    const files = e.target.files;
                    if (!files.length) return;
                    this.loading = true;
                    this.loadingStatus = 'UPLOADING BATCH...';
                    const formData = new FormData();
                    for (let i = 0; i < files.length; i++) formData.append('files', files[i]);
                    if (this.textInfo) formData.append('text', this.textInfo);
                    try {
                        const response = await fetch('/batch-upload', { method: 'POST', body: formData });
                        const data = await response.json();
                        if (data.success) {
                            this.notify(`${files.length} items queued`);
                            this.activeTab = 'review';
                            this.fetchQueue();
                        }
                    } catch (err) { this.notify('Upload Failed', 'error'); }
                    finally { this.loading = false; }
                },

                async discardItem(id) {
                    if (!confirm('Discard item?')) return;
                    await fetch(`/items/${id}`, { method: 'DELETE' });
                    this.queue = this.queue.filter(i => i.id !== id);
                    this.notify('Discarded');
                },

                notify(msg, type = 'success') {
                    const id = Date.now();
                    this.toasts.push({ id, msg, type, show: true });
                    setTimeout(() => {
                        const t = this.toasts.find(x => x.id === id);
                        if (t) t.show = false;
                    }, 4000);
                }
            }
        }
    </script>
</body>
</html>
